apiVersion: apps/v1
kind: Deployment
metadata:
  name: llmproxy-worker
  labels:
    app: llmproxy-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: llmproxy-worker
  template:
    metadata:
      labels:
        app: llmproxy-worker
    spec:
      containers:
        - name: worker
          image: llmproxy-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9001
          env:
            - name: WORKER_PORT
              value: "9001"
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: /health
              port: 9001
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"