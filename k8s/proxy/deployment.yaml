apiVersion: apps/v1
kind: Deployment
metadata:
  name: llmproxy-gateway
  labels:
    app: llmproxy-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llmproxy-gateway
  template:
    metadata:
      labels:
        app: llmproxy-gateway
    spec:
      containers:
        - name: proxy
          image: llmproxy-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PROXY_PORT
              value: "8080"
            - name: REDIS_ADDR
              value: "redis-service:6379"
            - name: WORKER_1_URL
              value: "http://llmproxy-worker-service:9001"
            - name: WORKER_2_URL
              value: "http://llmproxy-worker-service:9001"
            - name: WORKER_3_URL
              value: "http://llmproxy-worker-service:9001"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"